<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>BuilderK - Referral Program</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=DM+Sans:wght@400;500&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  font-family: 'DM Sans', sans-serif;
}

.container {
  width: 1080px;
  height: 1080px;
  background: #0A0A0A;
  display: flex;
  flex-direction: column;
  padding: 52px 64px 44px;
}

.badge {
  display: inline-flex;
  align-items: center;
  background: rgba(232, 121, 43, 0.15);
  border: 1.5px solid rgba(232, 121, 43, 0.4);
  border-radius: 100px;
  padding: 10px 24px;
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 17px;
  letter-spacing: 2.5px;
  color: #E8792B;
  margin-bottom: 20px;
  width: fit-content;
}

.badge::before {
  content: '';
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #E8792B;
  margin-right: 12px;
  flex-shrink: 0;
}

.headline {
  font-family: 'Outfit', sans-serif;
  font-weight: 900;
  font-size: 52px;
  line-height: 1.08;
  color: #FFFFFF;
  margin-bottom: 24px;
  letter-spacing: -1px;
}

/* Showcase image above the cards */
.image-frame {
  width: 100%;
  height: 248px;
  border-radius: 16px;
  overflow: hidden;
  border: 1.5px solid rgba(232, 121, 43, 0.35);
  box-shadow:
    0 0 0 1px rgba(0,0,0,0.5),
    0 10px 40px rgba(0,0,0,0.5),
    0 0 28px rgba(232, 121, 43, 0.07);
  margin-bottom: 24px;
  flex-shrink: 0;
}

.image-frame img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}

.cards {
  display: flex;
  gap: 16px;
  flex-grow: 1;
}

.card {
  flex: 1;
  background: #141414;
  border-radius: 14px;
  padding: 28px 24px;
  display: flex;
  flex-direction: column;
  border: 1px solid rgba(255,255,255,0.05);
}

.card-icon {
  font-size: 36px;
  margin-bottom: 16px;
  line-height: 1;
}

.card-title {
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 21px;
  color: #FFFFFF;
  margin-bottom: 8px;
  letter-spacing: -0.3px;
}

.card-desc {
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  font-size: 16px;
  line-height: 1.5;
  color: #888888;
}

.bottom-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 28px;
  border-top: 1px solid rgba(255,255,255,0.06);
  margin-top: 20px;
}

.logo {
  font-family: 'Outfit', sans-serif;
  font-weight: 900;
  font-size: 26px;
  letter-spacing: -0.5px;
}

.logo .builder { color: #FFFFFF; }
.logo .k { color: #E8792B; }

.referral-link {
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  font-size: 18px;
  color: #E8792B;
  letter-spacing: 0.3px;
}
</style>
</head>
<body>
<div class="container">

  <div class="badge">REFERRAL PROGRAM</div>

  <h1 class="headline">Earn 3% on<br>Every Build</h1>

  <div class="image-frame">
    <img src="https://www.builderk.com/images/style-coastal.png" alt="Coastal Style Home">
  </div>

  <div class="cards">
    <div class="card">
      <div class="card-icon">💰</div>
      <div class="card-title">3% Commission</div>
      <div class="card-desc">On every closed contract you refer</div>
    </div>
    <div class="card">
      <div class="card-icon">📈</div>
      <div class="card-title">Stack Your Earnings</div>
      <div class="card-desc">Earn on top of your normal commission</div>
    </div>
    <div class="card">
      <div class="card-icon">🏠</div>
      <div class="card-title">No Minimum</div>
      <div class="card-desc">Any project size qualifies</div>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="logo"><span class="builder">BUILDER</span><span class="k">K</span></div>
    <span class="referral-link">builderk.com/referral-program</span>
  </div>

</div>
</body>
</html>
