<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>BuilderK - Referral Program</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=DM+Sans:wght@400;500&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  font-family: 'DM Sans', sans-serif;
}

.container {
  width: 1080px;
  height: 1080px;
  background: #0A0A0A;
  position: relative;
  display: flex;
  flex-direction: column;
  padding: 60px 72px 52px;
  overflow: hidden;
}

/* Subtle background glow */
.bg-glow {
  position: absolute;
  top: -100px;
  right: -100px;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(232, 121, 43, 0.04) 0%, transparent 70%);
  pointer-events: none;
}

.badge {
  display: inline-flex;
  align-items: center;
  background: rgba(232, 121, 43, 0.15);
  border: 1.5px solid rgba(232, 121, 43, 0.4);
  border-radius: 100px;
  padding: 10px 24px;
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 17px;
  letter-spacing: 2.5px;
  color: #E8792B;
  margin-bottom: 36px;
  width: fit-content;
  position: relative;
  z-index: 1;
}

.badge::before {
  content: '';
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #E8792B;
  margin-right: 12px;
  flex-shrink: 0;
}

.headline {
  font-family: 'Outfit', sans-serif;
  font-weight: 900;
  font-size: 60px;
  line-height: 1.08;
  color: #FFFFFF;
  margin-bottom: 48px;
  letter-spacing: -1px;
  position: relative;
  z-index: 1;
}

.cards {
  display: flex;
  gap: 20px;
  margin-bottom: auto;
  position: relative;
  z-index: 1;
}

.card {
  flex: 1;
  background: #1A1A1A;
  border-radius: 16px;
  padding: 36px 28px;
  display: flex;
  flex-direction: column;
  border: 1px solid rgba(255,255,255,0.04);
  transition: border-color 0.3s;
}

.card:hover {
  border-color: rgba(232, 121, 43, 0.15);
}

.card-icon {
  font-size: 40px;
  margin-bottom: 20px;
  line-height: 1;
}

.card-title {
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 22px;
  color: #FFFFFF;
  margin-bottom: 10px;
  letter-spacing: -0.3px;
}

.card-desc {
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  font-size: 17px;
  line-height: 1.5;
  color: #999999;
}

.bottom-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 36px;
  border-top: 1px solid rgba(255,255,255,0.06);
  position: relative;
  z-index: 1;
}

.logo {
  font-family: 'Outfit', sans-serif;
  font-weight: 900;
  font-size: 26px;
  letter-spacing: -0.5px;
}

.logo .builder { color: #FFFFFF; }
.logo .k { color: #E8792B; }

.referral-link {
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  font-size: 19px;
  color: #E8792B;
  letter-spacing: 0.3px;
}
</style>
</head>
<body>
<div class="container">
  <div class="bg-glow"></div>

  <div class="badge">REFERRAL PROGRAM</div>

  <h1 class="headline">Earn 3% on<br>Every Build</h1>

  <div class="cards">
    <div class="card">
      <div class="card-icon">💰</div>
      <div class="card-title">3% Commission</div>
      <div class="card-desc">On every closed contract you refer</div>
    </div>
    <div class="card">
      <div class="card-icon">📈</div>
      <div class="card-title">Stack Your Earnings</div>
      <div class="card-desc">Earn on top of your normal commission</div>
    </div>
    <div class="card">
      <div class="card-icon">🏠</div>
      <div class="card-title">No Minimum</div>
      <div class="card-desc">Any project size qualifies</div>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="logo"><span class="builder">BUILDER</span><span class="k">K</span></div>
    <span class="referral-link">builderk.com/referral-program</span>
  </div>
</div>
</body>
</html>
