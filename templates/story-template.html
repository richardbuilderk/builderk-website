<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>BuilderK - Story Template</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=DM+Sans:wght@400;500&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1920px;
  overflow: hidden;
  font-family: 'DM Sans', sans-serif;
}

.container {
  width: 1080px;
  height: 1920px;
  background: #0A0A0A;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Decorative corner accents */
.corner-tl, .corner-tr, .corner-bl, .corner-br {
  position: absolute;
  width: 36px; height: 36px;
}
.corner-tl { top: 60px; left: 60px; border-top: 2px solid rgba(232,121,43,0.15); border-left: 2px solid rgba(232,121,43,0.15); }
.corner-tr { top: 60px; right: 60px; border-top: 2px solid rgba(232,121,43,0.15); border-right: 2px solid rgba(232,121,43,0.15); }
.corner-bl { bottom: 60px; left: 60px; border-bottom: 2px solid rgba(232,121,43,0.15); border-left: 2px solid rgba(232,121,43,0.15); }
.corner-br { bottom: 60px; right: 60px; border-bottom: 2px solid rgba(232,121,43,0.15); border-right: 2px solid rgba(232,121,43,0.15); }

/* Top section — Logo */
.top-section {
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  justify-content: center;
  padding-top: 200px;
  padding-bottom: 72px;
}

.logo {
  font-family: 'Outfit', sans-serif;
  font-weight: 900;
  font-size: 56px;
  letter-spacing: -1px;
  text-align: center;
}

.logo .builder { color: #FFFFFF; }
.logo .k { color: #E8792B; }

.logo-accent {
  width: 40px; height: 4px;
  background: #E8792B;
  border-radius: 2px;
  margin: 20px auto 0;
}

/* Middle section — Image + text */
.middle-section {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0 80px;
  width: 100%;
  gap: 0;
}

/* Prominent framed facade image */
.image-frame {
  width: 100%;
  height: 760px;
  border-radius: 16px;
  overflow: hidden;
  border: 1.5px solid rgba(232, 121, 43, 0.4);
  box-shadow:
    0 0 0 1px rgba(0,0,0,0.6),
    0 20px 72px rgba(0,0,0,0.6),
    0 0 48px rgba(232, 121, 43, 0.1);
  margin-bottom: 52px;
  flex-shrink: 0;
}

.image-frame img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}

.headline {
  font-family: 'Outfit', sans-serif;
  font-weight: 900;
  font-size: 64px;
  line-height: 1.12;
  color: #FFFFFF;
  text-align: center;
  margin-bottom: 36px;
  letter-spacing: -1px;
}

.orange-rule {
  width: 80px; height: 4px;
  background: #E8792B;
  border-radius: 2px;
  margin-bottom: 36px;
}

.body-text {
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  font-size: 26px;
  line-height: 1.6;
  color: #CCCCCC;
  max-width: 700px;
  text-align: center;
  letter-spacing: 0.3px;
}

/* Bottom section — CTA */
.bottom-section {
  flex: 0 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-bottom: 160px;
}

.cta-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: #E8792B;
  color: #FFFFFF;
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 22px;
  letter-spacing: 2px;
  padding: 22px 56px;
  border-radius: 16px;
  margin-bottom: 32px;
  box-shadow: 0 8px 32px rgba(232, 121, 43, 0.25);
}

.website {
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  font-size: 22px;
  color: rgba(255,255,255,0.35);
  letter-spacing: 0.5px;
}
</style>
</head>
<body>
<div class="container">
  <div class="corner-tl"></div>
  <div class="corner-tr"></div>
  <div class="corner-bl"></div>
  <div class="corner-br"></div>

  <div class="top-section">
    <div>
      <div class="logo"><span class="builder">BUILDER</span><span class="k">K</span></div>
      <div class="logo-accent"></div>
    </div>
  </div>

  <div class="middle-section">
    <div class="image-frame">
      <img src="https://www.builderk.com/images/facades/CO1%20%E2%80%94%20Contemporary%201-Story%20(Clean%20Lines).png" alt="Contemporary 1-Story Home">
    </div>
    <h1 class="headline">Build Your<br>Dream Home<br>in Florida</h1>
    <div class="orange-rule"></div>
    <p class="body-text">Design • Financing • Permits • Construction — All Under One Roof</p>
  </div>

  <div class="bottom-section">
    <div class="cta-button">START YOUR PROJECT</div>
    <span class="website">builderk.com</span>
  </div>
</div>
</body>
</html>
