<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>BuilderK - Construction Tip</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=DM+Sans:wght@400;500&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  font-family: 'DM Sans', sans-serif;
}

.container {
  width: 1080px;
  height: 1080px;
  background: #0A0A0A;
  position: relative;
  display: flex;
  flex-direction: column;
  padding: 56px 72px 52px;
}

.accent-line {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 6px;
  background: linear-gradient(90deg, #E8792B 0%, #E8792B 60%, transparent 100%);
}

.badge {
  display: inline-flex;
  align-items: center;
  background: rgba(232, 121, 43, 0.15);
  border: 1.5px solid rgba(232, 121, 43, 0.4);
  border-radius: 100px;
  padding: 10px 24px;
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 18px;
  letter-spacing: 2.5px;
  color: #E8792B;
  margin-bottom: 28px;
  width: fit-content;
}

.badge::before {
  content: '';
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #E8792B;
  margin-right: 12px;
  flex-shrink: 0;
}

.image-frame {
  width: 100%;
  height: 400px;
  border-radius: 16px;
  overflow: hidden;
  border: 1.5px solid rgba(232, 121, 43, 0.35);
  box-shadow:
    0 0 0 1px rgba(0,0,0,0.5),
    0 12px 48px rgba(0,0,0,0.5),
    0 0 32px rgba(232, 121, 43, 0.07);
  margin-bottom: 36px;
  flex-shrink: 0;
}

.image-frame img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}

.headline {
  font-family: 'Outfit', sans-serif;
  font-weight: 900;
  font-size: 46px;
  line-height: 1.12;
  color: #FFFFFF;
  margin-bottom: 20px;
  letter-spacing: -0.5px;
}

.body-text {
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  font-size: 21px;
  line-height: 1.6;
  color: #CCCCCC;
  flex-grow: 1;
}

.bottom-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: auto;
  padding-top: 32px;
  border-top: 1px solid rgba(255,255,255,0.06);
}

.logo {
  font-family: 'Outfit', sans-serif;
  font-weight: 900;
  font-size: 26px;
  letter-spacing: -0.5px;
}

.logo .builder { color: #FFFFFF; }
.logo .k { color: #E8792B; }

.website {
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  font-size: 19px;
  color: rgba(255,255,255,0.4);
  letter-spacing: 0.5px;
}
</style>
</head>
<body>
<div class="container">
  <div class="accent-line"></div>

  <div class="badge">CONSTRUCTION TIP</div>

  <div class="image-frame">
    <img src="https://www.builderk.com/images/hero-house.png" alt="BuilderK Home">
  </div>

  <h1 class="headline">Why Hurricane-Rated Windows Are Non-Negotiable in Florida</h1>

  <p class="body-text">Impact-resistant windows don't just protect against storms — they reduce insurance premiums, block UV damage, and increase your home's resale value by up to 15%.</p>

  <div class="bottom-bar">
    <div class="logo"><span class="builder">BUILDER</span><span class="k">K</span></div>
    <span class="website">builderk.com</span>
  </div>
</div>
</body>
</html>
