<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>BuilderK - Stats Post</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=DM+Sans:wght@400;500&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1200px;
  height: 1200px;
  overflow: hidden;
  font-family: 'DM Sans', sans-serif;
}

.container {
  width: 1200px;
  height: 1200px;
  background: #0A0A0A;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 64px 60px 56px;
}

/* Top stat section */
.top-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  margin-bottom: 44px;
}

.big-number {
  font-family: 'Outfit', sans-serif;
  font-weight: 900;
  font-size: 180px;
  color: #E8792B;
  line-height: 1;
  letter-spacing: -6px;
  text-shadow: 0 0 60px rgba(232, 121, 43, 0.2);
}

.subtitle {
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 36px;
  color: #FFFFFF;
  letter-spacing: 0.5px;
  margin-top: 8px;
}

/* Image frame — the visual centerpiece */
.image-frame {
  width: 960px;
  height: 600px;
  border-radius: 16px;
  overflow: hidden;
  border: 1.5px solid rgba(232, 121, 43, 0.35);
  box-shadow:
    0 0 0 1px rgba(0,0,0,0.6),
    0 16px 64px rgba(0,0,0,0.6),
    0 0 40px rgba(232, 121, 43, 0.08);
  flex-shrink: 0;
}

.image-frame img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* Bottom info section */
.bottom-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: auto;
  padding-top: 32px;
  width: 100%;
}

.cities {
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  font-size: 19px;
  color: #666666;
  letter-spacing: 0.3px;
  margin-bottom: 28px;
}

.divider {
  width: 100%;
  height: 1px;
  background: rgba(255,255,255,0.06);
  margin-bottom: 24px;
}

.logo {
  font-family: 'Outfit', sans-serif;
  font-weight: 900;
  font-size: 26px;
  letter-spacing: -0.5px;
}

.logo .builder { color: #FFFFFF; }
.logo .k { color: #E8792B; }
</style>
</head>
<body>
<div class="container">

  <div class="top-section">
    <div class="big-number">150+</div>
    <h2 class="subtitle">Units Built Across Florida</h2>
  </div>

  <div class="image-frame">
    <img src="https://www.builderk.com/images/hero-house.png" alt="BuilderK Home">
  </div>

  <div class="bottom-section">
    <p class="cities">Orlando • Tampa • Miami • Cape Coral • Fort Myers • Jacksonville • Ocala</p>
    <div class="divider"></div>
    <div class="logo"><span class="builder">BUILDER</span><span class="k">K</span></div>
  </div>

</div>
</body>
</html>
