<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>BuilderK - Interior Showcase</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=DM+Sans:wght@400;500&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  font-family: 'DM Sans', sans-serif;
}

.container {
  width: 1080px;
  height: 1080px;
  position: relative;
  overflow: hidden;
}

/* Simulated luxury kitchen background */
.bg-layer {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(196, 155, 100, 0.25) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 30%, rgba(180, 140, 80, 0.15) 0%, transparent 45%),
    radial-gradient(ellipse at 50% 60%, rgba(160, 120, 60, 0.1) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 80%, rgba(140, 100, 50, 0.08) 0%, transparent 40%),
    linear-gradient(180deg, #1A1510 0%, #15120E 30%, #110E0A 60%, #0D0A08 100%);
}

/* Fake architectural lines suggesting cabinets/countertops */
.arch-lines {
  position: absolute;
  inset: 0;
  opacity: 0.06;
}

.arch-lines::before {
  content: '';
  position: absolute;
  top: 280px;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent 10%, rgba(196,155,100,1) 30%, rgba(196,155,100,1) 70%, transparent 90%);
}

.arch-lines::after {
  content: '';
  position: absolute;
  top: 500px;
  left: 100px;
  right: 100px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(196,155,100,0.6), transparent);
}

/* Warm light spots simulating kitchen lighting */
.light-spot-1 {
  position: absolute;
  top: 80px;
  left: 200px;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(220, 180, 120, 0.12) 0%, transparent 70%);
  border-radius: 50%;
}

.light-spot-2 {
  position: absolute;
  top: 100px;
  right: 250px;
  width: 250px;
  height: 250px;
  background: radial-gradient(circle, rgba(220, 180, 120, 0.08) 0%, transparent 70%);
  border-radius: 50%;
}

.light-spot-3 {
  position: absolute;
  top: 60px;
  left: 480px;
  width: 200px;
  height: 400px;
  background: radial-gradient(ellipse, rgba(255, 220, 160, 0.06) 0%, transparent 70%);
}

/* Counter surface reflection */
.counter-glow {
  position: absolute;
  bottom: 350px;
  left: 0;
  right: 0;
  height: 200px;
  background: linear-gradient(0deg, transparent, rgba(180, 150, 100, 0.04), transparent);
}

/* Bottom gradient overlay */
.gradient-overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 520px;
  background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.85) 30%, rgba(0,0,0,0.4) 65%, transparent 100%);
  z-index: 2;
}

/* Top-right badge */
.badge {
  position: absolute;
  top: 48px;
  right: 48px;
  z-index: 5;
  display: inline-flex;
  align-items: center;
  background: rgba(232, 121, 43, 0.2);
  border: 1.5px solid rgba(232, 121, 43, 0.5);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-radius: 100px;
  padding: 10px 22px;
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 16px;
  letter-spacing: 2px;
  color: #E8792B;
}

.badge::before {
  content: '';
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #E8792B;
  margin-right: 10px;
  flex-shrink: 0;
}

.content {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 3;
  padding: 0 72px 56px;
}

.headline {
  font-family: 'Outfit', sans-serif;
  font-weight: 900;
  font-size: 56px;
  line-height: 1.1;
  color: #FFFFFF;
  margin-bottom: 20px;
  letter-spacing: -0.5px;
}

.subtext {
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  font-size: 22px;
  color: rgba(255,255,255,0.7);
  letter-spacing: 1px;
  margin-bottom: 48px;
}

.bottom-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 32px;
  border-top: 1px solid rgba(255,255,255,0.08);
}

.logo {
  font-family: 'Outfit', sans-serif;
  font-weight: 900;
  font-size: 26px;
  letter-spacing: -0.5px;
}

.logo .builder { color: #FFFFFF; }
.logo .k { color: #E8792B; }

.website {
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  font-size: 18px;
  color: rgba(255,255,255,0.35);
}
</style>
</head>
<body>
<div class="container">
  <div class="bg-layer"></div>
  <div class="arch-lines"></div>
  <div class="light-spot-1"></div>
  <div class="light-spot-2"></div>
  <div class="light-spot-3"></div>
  <div class="counter-glow"></div>
  <div class="gradient-overlay"></div>

  <div class="badge">INTERIOR DESIGN</div>

  <div class="content">
    <h1 class="headline">Modern Coastal Kitchen</h1>
    <p class="subtext">Custom Finishes • Your Vision • Our Craftsmanship</p>

    <div class="bottom-bar">
      <div class="logo"><span class="builder">BUILDER</span><span class="k">K</span></div>
      <span class="website">builderk.com</span>
    </div>
  </div>
</div>
</body>
</html>
