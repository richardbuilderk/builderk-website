<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>BuilderK - Interior Showcase</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=DM+Sans:wght@400;500&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  font-family: 'DM Sans', sans-serif;
}

.container {
  width: 1080px;
  height: 1080px;
  position: relative;
  overflow: hidden;
}

/* Real facade photo background */
.bg-image {
  position: absolute;
  inset: 0;
  background: url('https://www.builderk.com/images/facades/C4%20%E2%80%94%20Coastal%202-Story%20Beach%20Luxury%20(All%20Stucco).png') center center / cover no-repeat;
  z-index: 0;
}

/* Bottom gradient overlay */
.gradient-overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 520px;
  background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.85) 30%, rgba(0,0,0,0.4) 65%, transparent 100%);
  z-index: 2;
}

/* Top-right badge */
.badge {
  position: absolute;
  top: 48px;
  right: 48px;
  z-index: 5;
  display: inline-flex;
  align-items: center;
  background: rgba(232, 121, 43, 0.2);
  border: 1.5px solid rgba(232, 121, 43, 0.5);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-radius: 100px;
  padding: 10px 22px;
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 16px;
  letter-spacing: 2px;
  color: #E8792B;
}

.badge::before {
  content: '';
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #E8792B;
  margin-right: 10px;
  flex-shrink: 0;
}

.content {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 3;
  padding: 0 72px 56px;
}

.headline {
  font-family: 'Outfit', sans-serif;
  font-weight: 900;
  font-size: 56px;
  line-height: 1.1;
  color: #FFFFFF;
  margin-bottom: 20px;
  letter-spacing: -0.5px;
}

.subtext {
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  font-size: 22px;
  color: rgba(255,255,255,0.7);
  letter-spacing: 1px;
  margin-bottom: 48px;
}

.bottom-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 32px;
  border-top: 1px solid rgba(255,255,255,0.08);
}

.logo {
  font-family: 'Outfit', sans-serif;
  font-weight: 900;
  font-size: 26px;
  letter-spacing: -0.5px;
}

.logo .builder { color: #FFFFFF; }
.logo .k { color: #E8792B; }

.website {
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  font-size: 18px;
  color: rgba(255,255,255,0.35);
}
</style>
</head>
<body>
<div class="container">
  <div class="bg-image"></div>
  <div class="gradient-overlay"></div>

  <div class="badge">INTERIOR DESIGN</div>

  <div class="content">
    <h1 class="headline">Coastal 2-Story Beach Luxury</h1>
    <p class="subtext">Custom Finishes • Your Vision • Our Craftsmanship</p>

    <div class="bottom-bar">
      <div class="logo"><span class="builder">BUILDER</span><span class="k">K</span></div>
      <span class="website">builderk.com</span>
    </div>
  </div>
</div>
</body>
</html>
