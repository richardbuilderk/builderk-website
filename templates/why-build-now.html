<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>BuilderK - Why Build Now</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=DM+Sans:wght@400;500&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  font-family: 'DM Sans', sans-serif;
}

.container {
  width: 1080px;
  height: 1080px;
  background: linear-gradient(160deg, #0F0F0F 0%, #0A0A0A 40%, #0D0B08 100%);
  position: relative;
  display: flex;
  flex-direction: column;
  padding: 56px 72px 52px;
  overflow: hidden;
}

/* Oversized decorative quote marks as watermark */
.quote-mark {
  position: absolute;
  top: -20px;
  left: 40px;
  font-family: 'Outfit', sans-serif;
  font-weight: 900;
  font-size: 400px;
  color: #181818;
  line-height: 1;
  pointer-events: none;
  user-select: none;
  z-index: 0;
}

.quote-mark-close {
  position: absolute;
  bottom: 40px;
  right: 40px;
  font-family: 'Outfit', sans-serif;
  font-weight: 900;
  font-size: 400px;
  color: #181818;
  line-height: 1;
  pointer-events: none;
  user-select: none;
  transform: rotate(180deg);
  z-index: 0;
}

.image-frame {
  width: 100%;
  height: 380px;
  border-radius: 16px;
  overflow: hidden;
  border: 1.5px solid rgba(232, 121, 43, 0.35);
  box-shadow:
    0 0 0 1px rgba(0,0,0,0.5),
    0 12px 48px rgba(0,0,0,0.5),
    0 0 32px rgba(232, 121, 43, 0.07);
  margin-bottom: 40px;
  flex-shrink: 0;
  position: relative;
  z-index: 1;
}

.image-frame img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}

.content {
  position: relative;
  z-index: 1;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  flex-grow: 1;
  justify-content: center;
}

.quote-text {
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 40px;
  line-height: 1.3;
  color: #FFFFFF;
  max-width: 820px;
  margin-bottom: 36px;
  letter-spacing: -0.3px;
}

.quote-text::before {
  content: '';
  display: block;
  width: 60px;
  height: 4px;
  background: #E8792B;
  margin: 0 auto 32px;
  border-radius: 2px;
}

.attribution {
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  font-size: 20px;
  color: #E8792B;
  letter-spacing: 0.5px;
}

.bottom-section {
  position: relative;
  z-index: 1;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 32px;
  border-top: 1px solid rgba(255,255,255,0.06);
}

.logo {
  font-family: 'Outfit', sans-serif;
  font-weight: 900;
  font-size: 26px;
  letter-spacing: -0.5px;
}

.logo .builder { color: #FFFFFF; }
.logo .k { color: #E8792B; }

.dot-accent {
  display: flex;
  gap: 6px;
}

.dot-accent span {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(232, 121, 43, 0.3);
}

.dot-accent span:first-child {
  background: #E8792B;
}
</style>
</head>
<body>
<div class="container">
  <div class="quote-mark">"</div>
  <div class="quote-mark-close">"</div>

  <div class="image-frame">
    <img src="https://www.builderk.com/images/style-modern.png" alt="Modern Home Style">
  </div>

  <div class="content">
    <p class="quote-text">With construction loan rates stabilizing, there's never been a better time to build in Florida</p>
    <span class="attribution">— BuilderK  |  Licensed Florida GC, CGC #1537163</span>
  </div>

  <div class="bottom-section">
    <div class="logo"><span class="builder">BUILDER</span><span class="k">K</span></div>
    <div class="dot-accent">
      <span></span><span></span><span></span>
    </div>
  </div>
</div>
</body>
</html>
