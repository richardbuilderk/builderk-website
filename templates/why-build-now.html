<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>BuilderK - Why Build Now</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=DM+Sans:wght@400;500&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  font-family: 'DM Sans', sans-serif;
}

.container {
  width: 1080px;
  height: 1080px;
  background: linear-gradient(160deg, #0F0F0F 0%, #0A0A0A 40%, #0D0B08 100%);
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 80px 80px 64px;
  overflow: hidden;
}

/* Background photo layer */
.bg-image {
  position: absolute;
  inset: 0;
  background: url('https://www.builderk.com/images/style-modern.png') center center / cover no-repeat;
  opacity: 0.10;
  z-index: 0;
}

/* Large quotation mark watermark */
.quote-mark {
  position: absolute;
  top: -30px;
  left: 40px;
  font-family: 'Outfit', sans-serif;
  font-weight: 900;
  font-size: 480px;
  color: #1A1A1A;
  line-height: 1;
  pointer-events: none;
  user-select: none;
}

.quote-mark-close {
  position: absolute;
  bottom: 60px;
  right: 40px;
  font-family: 'Outfit', sans-serif;
  font-weight: 900;
  font-size: 480px;
  color: #1A1A1A;
  line-height: 1;
  pointer-events: none;
  user-select: none;
  transform: rotate(180deg);
}

.content {
  position: relative;
  z-index: 1;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  flex-grow: 1;
  justify-content: center;
}

.quote-text {
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 46px;
  line-height: 1.3;
  color: #FFFFFF;
  max-width: 820px;
  margin-bottom: 56px;
  letter-spacing: -0.3px;
}

.quote-text::before {
  content: '';
  display: block;
  width: 60px;
  height: 4px;
  background: #E8792B;
  margin: 0 auto 40px;
  border-radius: 2px;
}

.attribution {
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  font-size: 22px;
  color: #E8792B;
  letter-spacing: 0.5px;
}

.bottom-section {
  position: relative;
  z-index: 1;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: auto;
  padding-top: 40px;
}

.logo {
  font-family: 'Outfit', sans-serif;
  font-weight: 900;
  font-size: 26px;
  letter-spacing: -0.5px;
}

.logo .builder { color: #FFFFFF; }
.logo .k { color: #E8792B; }

/* Subtle decorative dots */
.dot-accent {
  display: flex;
  gap: 6px;
}

.dot-accent span {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: rgba(232, 121, 43, 0.3);
}

.dot-accent span:first-child {
  background: #E8792B;
}
</style>
</head>
<body>
<div class="container">
  <div class="bg-image"></div>
  <div class="quote-mark">"</div>
  <div class="quote-mark-close">"</div>

  <div class="content">
    <p class="quote-text">With construction loan rates stabilizing, there's never been a better time to build in Florida</p>
    <span class="attribution">— BuilderK  |  150+ Units Built</span>
  </div>

  <div class="bottom-section">
    <div class="logo"><span class="builder">BUILDER</span><span class="k">K</span></div>
    <div class="dot-accent">
      <span></span><span></span><span></span>
    </div>
  </div>
</div>
</body>
</html>
